kind = "web"
previewPath = "/"
title = "Cyber RPG"
version = "1.0.0"
id = "artifacts/cyber-rpg"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24818

[services.development]
run = "pnpm --filter @workspace/cyber-rpg run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/cyber-rpg", "run", "build" ]
publicDir = "artifacts/cyber-rpg/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24818"
BASE_PATH = "/"
